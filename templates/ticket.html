{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
  <div class="flex items-center gap-4 mb-6">
    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl">🛡️</div>
    <div>
      <h1 class="text-3xl font-bold">Ticket #{{ ticket.ticket_id }}</h1>
      <p class="text-green-600">Live Support • Status: {{ ticket.status }}</p>
    </div>
  </div>

  chat box
  
  <div id="chat-box" class="bg-white rounded-3xl shadow-xl p-8 mt-8 h-[500px] overflow-y-auto space-y-8 border border-gray-100">
  {% for msg in messages %}
    <div class="flex {{ 'justify-end' if msg.sender == 'user' else 'justify-start' }}">
      <div class="max-w-[75%]">
        <div class="flex items-center gap-3 mb-2 {{ 'justify-end' if msg.sender == 'user' else '' }}">
          <span class="text-xs text-gray-500">{{ msg.date.strftime('%H:%M') }}</span>
          <span class="text-xs font-medium {{ 'text-blue-600' if msg.sender == 'user' else 'text-emerald-600' }}">
            {{ 'You' if msg.sender == 'user' else 'Support Expert' }}
          </span>
        </div>
        <div class="p-5 rounded-3xl {{ 'bg-blue-600 text-white' if msg.sender == 'user' else 'bg-emerald-100 text-gray-800' }}">
          <p class="text-lg">{{ msg.message }}</p>
        </div>
      </div>
    </div>
  {% endfor %}
</div>

  <!-- Send Message -->
  <form method="POST" action="/send_message" class="mt-8 flex gap-4">
    <input type="hidden" name="ticket_id" value="{{ ticket.ticket_id }}">
    <input type="hidden" name="sender" value="user">
    <input type="text" name="message" placeholder="Type your message here..." required 
           class="flex-1 p-6 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500 text-lg">
    <button type="submit" class="bg-blue-600 text-white px-12 rounded-3xl font-semibold">Send</button>
  </form>
</div>
{% endblock %}
