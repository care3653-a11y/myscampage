{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
  <h1 class="text-3xl font-bold mb-2">Chat #{{ chat_id }}</h1>
  <p class="text-green-600">Connected with Support</p>

  <div id="chat-box" class="bg-white rounded-3xl shadow p-8 mt-8 h-[500px] overflow-y-auto"></div>

  <form id="chatForm" class="mt-8 flex gap-4">
    <input type="hidden" name="chat_id" value="{{ chat_id }}">
    <input type="text" id="messageInput" placeholder="Type your message..." required 
           class="flex-1 p-6 border border-gray-300 rounded-3xl focus:outline-none focus:border-blue-500">
    <button type="submit" class="bg-blue-600 text-white px-12 rounded-3xl font-semibold">Send</button>
  </form>
</div>
{% endblock %}
