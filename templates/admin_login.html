{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
  <div class="bg-white rounded-3xl shadow-xl p-10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-3xl mb-4">🔑</div>
      <h1 class="text-2xl font-bold text-gray-900">Admin Login</h1>
      <p class="text-gray-500">Staff Portal</p>
    </div>

    <form method="POST" action="/admin/login">
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input type="text" name="username" required 
               class="w-full p-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
      </div>

      <div class="mb-8">
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" name="password" required 
               class="w-full p-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500">
      </div>

      <button type="submit" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg">
        Login to Admin Panel
      </button>
    </form>

    <p class="text-center text-xs text-gray-500 mt-6">
      For authorized staff only
    </p>
  </div>
</div>
{% endblock %}
