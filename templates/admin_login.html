{% extends "base.html" %}
{% block title %}Staff sign-in — MyScamShield{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-6 mt-20">
  <div class="bg-white rounded-3xl shadow-sm p-10">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-brand rounded-2xl mx-auto flex items-center justify-center text-white text-2xl mb-4">🔒</div>
      <h1 class="text-2xl font-display font-semibold text-ink">Volunteer sign-in</h1>
      <p class="text-slate-500 text-sm">Staff portal</p>
    </div>

    <form method="POST" action="/admin/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-700 mb-2">Username</label>
        <input type="text" name="username" required class="w-full p-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-brand">
      </div>
      <div class="mb-8">
        <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
        <input type="password" name="password" required class="w-full p-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-brand">
      </div>
      <button type="submit" class="w-full bg-brand text-white py-4 rounded-2xl font-semibold hover:brightness-110 transition">Sign in</button>
    </form>
    <p class="text-center text-xs text-slate-400 mt-6">Authorized volunteers only</p>
  </div>
</div>
{% endblock %}
